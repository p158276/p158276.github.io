<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — Kunyu (Chris) Lin</title>
  <meta name="description" content="Kunyu (Chris) Lin — Senior Solution Engineer, Ad Tech, London.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a href="{{ '/' | relative_url }}" class="site-logo">Kunyu (Chris) Lin</a>
      <button class="nav-toggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a>
        <a href="{{ '/about/' | relative_url }}" {% if page.url == '/about/' %}class="active"{% endif %}>CV</a>
        <a href="{{ '/portfolio/' | relative_url }}" {% if page.url == '/portfolio/' %}class="active"{% endif %}>Work</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <span class="footer-left">&copy; {{ 'now' | date: '%Y' }} Kunyu Lin &middot; London, UK</span>
      <div class="footer-links">
        <a href="mailto:p158276@gmail.com">Email</a>
        <a href="https://www.linkedin.com/in/kunyu-lin/" target="_blank" rel="noopener">LinkedIn</a>
        <a href="https://github.com/p158276" target="_blank" rel="noopener">GitHub</a>
      </div>
    </div>
  </footer>

  <script>
    const toggle = document.querySelector('.nav-toggle');
    const nav = document.querySelector('.site-nav');
    if (toggle) {
      toggle.addEventListener('click', () => {
        nav.classList.toggle('open');
      });
    }
  </script>
</body>
</html>
